<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Museum of G</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.8;
            margin: 0;
            scroll-behavior: smooth;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 45px;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        nav a {
            text-decoration: none;
            color: #999;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #1a1a1a;
            letter-spacing: 3px;
        }

        section {
            padding: 150px 40px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 50vh;
        }

        h2 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 60px;
            color: #1a1a1a;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .intro {
            text-align: center;
            padding-top: 250px;
            min-height: 80
