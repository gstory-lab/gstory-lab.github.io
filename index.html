<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        /* 깔끔하고 세련된 구글 폰트 적용 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            text-align: left;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-weight: 300;
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        p {
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>I'm G.</h1>
        
        <p class="subtitle">Digital Enthusiast & Curator</p>
        
        <p>
            Welcome. I value simplicity and functional beauty.<br>
            Currently focusing on building clean web experiences.<br>
            Based in US.
        </p>
    </div>
</body>
</html>
